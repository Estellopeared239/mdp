version: 2

builds:
  - main: ./cmd/mdp
    binary: mdp
    ldflags:
      - -s -w -X github.com/mxcoppell/mdp/internal/version.Version={{.Version}}
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - skills/mdp.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

homebrew_casks:
  - repository:
      owner: mxcoppell
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    name: mdp
    homepage: https://github.com/mxcoppell/mdp
    description: CLI tool for previewing markdown files in a native window
    license: MIT
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mdp"]
          end
